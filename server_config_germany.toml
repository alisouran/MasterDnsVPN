# ==============================================================================
# MasterDnsVPN — Germany VPS Server Config (2 cores / 4 GB RAM)
# Tuned for: single Iran client, speed-biased, intercontinental DNS tunnel.
# Deploy: copy to server_config.toml on the Germany VPS.
# ==============================================================================

# ------------------------------------------------------------------------------
# 1) Tunnel Policy
# ------------------------------------------------------------------------------

# Your tunnel domain — must match client DOMAINS exactly.
# Prerequisites: NS record for v.your-domain.com → ns.your-domain.com → <Germany IP>
DOMAIN = ["v.your-domain.com"]

PROTOCOL_TYPE = "SOCKS5"

# Compression OFF — saves CPU. DNS tunnel overhead is per-packet, not per-byte.
SUPPORTED_UPLOAD_COMPRESSION_TYPES = [0]
SUPPORTED_DOWNLOAD_COMPRESSION_TYPES = [0]

# ------------------------------------------------------------------------------
# 2) UDP Listener & Front-Door Capacity
# ------------------------------------------------------------------------------

UDP_HOST = "0.0.0.0"
UDP_PORT = 53

# 2-core VPS: UDP_READERS = NumCPU/2 = 1, bumped to 2 for headroom.
UDP_READERS = 2
# 4× cores: enough request workers without over-threading.
DNS_REQUEST_WORKERS = 8
# Single Iran client — 8192 is ample, saves memory vs 16384 default.
MAX_CONCURRENT_REQUESTS = 8192

# 16 MB UDP kernel buffer (you have 4 GB RAM — worth it).
SOCKET_BUFFER_SIZE = 16777216

MAX_PACKET_SIZE = 65535
DROP_LOG_INTERVAL_SECONDS = 2.0

# ------------------------------------------------------------------------------
# 3) Deferred Session Runtime
# ------------------------------------------------------------------------------

DEFERRED_SESSION_WORKERS = 4
DEFERRED_SESSION_QUEUE_LIMIT = 4096

# ------------------------------------------------------------------------------
# 4) Session Lifecycle & Invalid-Cookie Handling
# ------------------------------------------------------------------------------

INVALID_COOKIE_WINDOW_SECONDS = 2.0
INVALID_COOKIE_ERROR_THRESHOLD = 10
SESSION_TIMEOUT_SECONDS = 300.0
SESSION_CLEANUP_INTERVAL_SECONDS = 30.0
CLOSED_SESSION_RETENTION_SECONDS = 600.0
SESSION_INIT_REUSE_TTL_SECONDS = 600.0
RECENTLY_CLOSED_STREAM_TTL_SECONDS = 600.0
RECENTLY_CLOSED_STREAM_CAP = 2000
TERMINAL_STREAM_RETENTION_SECONDS = 45.0

# ------------------------------------------------------------------------------
# 5) DNS Tunnel Upstream
# ------------------------------------------------------------------------------

# Use resolvers close to Frankfurt/Germany for lowest RTT.
DNS_UPSTREAM_SERVERS = ["1.1.1.1:53", "1.0.0.1:53", "8.8.8.8:53", "9.9.9.9:53"]

# German network is fast — 2 s is generous.
DNS_UPSTREAM_TIMEOUT = 2.0
DNS_INFLIGHT_WAIT_TIMEOUT_SECONDS = 10.0
DNS_FRAGMENT_ASSEMBLY_TIMEOUT = 300.0

# Large cache — you have the RAM.
DNS_CACHE_MAX_RECORDS = 100000
# Doubled from default — more cache hits, fewer upstream queries.
DNS_CACHE_TTL_SECONDS = 600.0

# ------------------------------------------------------------------------------
# 6) Upstream SOCKS / Forwarding
# ------------------------------------------------------------------------------

# German internet is fast — 30 s is plenty for connect timeout.
SOCKS_CONNECT_TIMEOUT = 30.0

USE_EXTERNAL_SOCKS5 = false
SOCKS5_AUTH = false
SOCKS5_USER = "admin"
SOCKS5_PASS = "123456"
FORWARD_IP = ""
FORWARD_PORT = 0

# ------------------------------------------------------------------------------
# 7) Security
# ------------------------------------------------------------------------------

# XOR (1) for maximum throughput. The Iran→Germany DNS RTT is the bottleneck,
# not CPU. If you want real confidentiality at near-zero throughput cost,
# switch to ChaCha20 (2).
DATA_ENCRYPTION_METHOD = 1

# Key is generated by server_linux_install.sh and printed during installation.
# Must match ENCRYPTION_KEY on the Iran client exactly.
ENCRYPTION_KEY_FILE = "encrypt_key.txt"

# ------------------------------------------------------------------------------
# 8) ARQ, Packing, and Setup-Control TTLs
# ------------------------------------------------------------------------------

# Pack more control blocks per batch — reduces round-trips on lossy DNS.
MAX_PACKETS_PER_BATCH = 8
# Duplicate last control block 1 extra turn — helps CLOSE/SYN-ACK on lossy links.
PACKET_BLOCK_CONTROL_DUPLICATION = 2

STREAM_SETUP_ACK_TTL_SECONDS = 400.0
STREAM_RESULT_PACKET_TTL_SECONDS = 300.0
STREAM_FAILURE_PACKET_TTL_SECONDS = 120.0

# Larger window for intercontinental RTT between Iran resolvers and Germany.
ARQ_WINDOW_SIZE = 1200
ARQ_INITIAL_RTO_SECONDS = 1.0
ARQ_MAX_RTO_SECONDS = 5.0
ARQ_CONTROL_INITIAL_RTO_SECONDS = 0.5
ARQ_CONTROL_MAX_RTO_SECONDS = 3.0
ARQ_MAX_CONTROL_RETRIES = 400
ARQ_INACTIVITY_TIMEOUT_SECONDS = 1800.0
ARQ_DATA_PACKET_TTL_SECONDS = 2400.0
ARQ_CONTROL_PACKET_TTL_SECONDS = 1200.0
ARQ_MAX_DATA_RETRIES = 1200
ARQ_DATA_NACK_MAX_GAP = 16
ARQ_DATA_NACK_INITIAL_DELAY_SECONDS = 0.3
ARQ_DATA_NACK_REPEAT_SECONDS = 1.0
ARQ_TERMINAL_DRAIN_TIMEOUT_SECONDS = 120.0
ARQ_TERMINAL_ACK_WAIT_TIMEOUT_SECONDS = 90.0

# ------------------------------------------------------------------------------
# 8.0) Server-Side Session/Stream Limits
# Limits enforced on server, not sent to client.
# ------------------------------------------------------------------------------

# Single Iran client: 1 active session is all you need, but allow more headroom.
MAX_ALLOWED_CLIENT_ACTIVE_SESSION = 10
MAX_ALLOWED_CLIENT_ACTIVE_STREAMS_PER_SESSION = 2000

# ------------------------------------------------------------------------------
# 8.1) Client Policy Sync Limits
# Server-side ceilings that get communicated to the client during session init.
# ------------------------------------------------------------------------------

MAX_ALLOWED_CLIENT_PACKET_DUPLICATION_COUNT = 5
MAX_ALLOWED_CLIENT_SETUP_PACKET_DUPLICATION_COUNT = 6
MAX_ALLOWED_CLIENT_UPLOAD_MTU = 150
MAX_ALLOWED_CLIENT_DOWNLOAD_MTU = 4096
MAX_ALLOWED_CLIENT_RX_TX_WORKERS = 255
MIN_ALLOWED_CLIENT_PING_AGGRESSIVE_INTERVAL_SECONDS = 0.05
MAX_ALLOWED_CLIENT_PACKETS_PER_BATCH = 20
MAX_ALLOWED_CLIENT_ARQ_WINDOW_SIZE = 8000
MAX_ALLOWED_CLIENT_ARQ_DATA_NACK_MAX_GAP = 255
MIN_ALLOWED_CLIENT_COMPRESSION_MIN_SIZE = 120
MIN_ALLOWED_CLIENT_ARQ_INITIAL_RTO_SECONDS = 0.05

# ------------------------------------------------------------------------------
# 9) Logging
# ------------------------------------------------------------------------------

# WARN: quieter disk I/O; bump to INFO temporarily when diagnosing issues.
LOG_LEVEL = "WARN"

# ------------------------------------------------------------------------------

CONFIG_VERSION = "12"
